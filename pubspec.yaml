name: vibecut_pro
description: "محرر فيديو عربي/إنجليزي محترف"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.3
  video_player: ^2.8.6
  file_picker: ^6.1.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  record: ^4.4.4
  # بديل صيانة موثوق بعد توقف ffmpeg_kit_flutter_full_gpl رسميًا في 2025
  ffmpeg_kit_flutter_new: ^3.2.0
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.10.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/core/translations/
    - assets/core/stickers/
    - assets/core/filters/luts/
    - assets/icon.png
    # ملاحظة: الانتقالات (Transitions) لا تحتاج ملفات، تُنفَّذ عبر فلتر
    # xfade المدمج بـ FFmpeg مباشرة.
    # مجلد assets/core/audio/ (10 مقاطع MP3 مجانية) لم تُرفع بعد - أضفه هنا
    # وأضف "- assets/core/audio/" لهذه القائمة بمجرد توفر الملفات.

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
